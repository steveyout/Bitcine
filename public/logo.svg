<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%" fill="none">
  <defs>
    <!-- Beautiful vivid gradients matching the exact color palette of the uploaded ribbon play button -->
    <linearGradient id="leftStemGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5e2cee" />
      <stop offset="60%" stop-color="#8041f5" />
      <stop offset="100%" stop-color="#9e62fc" />
    </linearGradient>
    <linearGradient id="topRibbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9053fa" />
      <stop offset="50%" stop-color="#7036f3" />
      <stop offset="100%" stop-color="#5c24e8" />
    </linearGradient>
    <linearGradient id="bottomRibbonGrad" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#551ce4" />
      <stop offset="100%" stop-color="#7a3cf1" />
    </linearGradient>
    
    <!-- Outer branding drop shadows for luxury look -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7a3cf1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#softGlow)">
    <!-- Left Ribbon Segment: Curves at bottom-left corner and rises vertically -->
    <path d="M 45 32 
             C 45 20, 56 12, 68 18 
             L 68 18 
             C 74 21, 78 28, 78 35 
             L 78 112 
             C 78 128, 65 141, 49 141 
             L 39 141 
             C 21 141, 8 126, 8 108 
             L 8 108
             C 8 98, 13 89, 21 84 
             L 45 68 Z" 
          fill="url(#leftStemGrad)" />

    <!-- Top Ribbon Segment: Curves at the top-left loop and descends down-right to the apex -->
    <path d="M 127 92 
             C 137 98, 148 89, 145 77 
             L 145 77 
             C 144 70, 139 65, 133 61 
             L 66 22 
             C 52 14, 34 22, 28 38 
             L 25 46 
             C 19 64, 30 83, 48 87 
             L 58 89 
             C 67 91, 76 87, 82 81 
             L 127 52 Z" 
          fill="url(#topRibbonGrad)" />

    <!-- Bottom Ribbon Segment: Curves around the right apex and returns back along the bottom edge -->
    <path d="M 68 112 
             C 62 102, 47 101, 40 110 
             L 40 110 
             C 36 115, 36 122, 39 128 
             L 78 141 
             C 94 146, 112 139, 120 125 
             L 124 117 
             C 133 101, 126 81, 108 73 
             L 99 69 
             C 90 65, 80 67, 72 73 
             Z" 
          fill="url(#bottomRibbonGrad)" />
  </g>
</svg>
