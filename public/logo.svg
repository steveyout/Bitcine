<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%" fill="none">
  <defs>
    <!-- Beautiful vivid gradients matching the red button palette in the uploaded image -->
    <linearGradient id="mainCoralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5c62" />
      <stop offset="60%" stop-color="#e50914" />
      <stop offset="100%" stop-color="#ab0409" />
    </linearGradient>
    <linearGradient id="overlaySweepGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#900204" />
      <stop offset="50%" stop-color="#c8070d" />
      <stop offset="100%" stop-color="#ff1c20" />
    </linearGradient>
    <linearGradient id="backSweepGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4e0002" />
      <stop offset="100%" stop-color="#800204" />
    </linearGradient>
    
    <!-- Outer branding drop shadows for luxury look -->
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#e50914" flood-opacity="0.32" />
    </filter>
  </defs>

  <g filter="url(#softGlow)">
    <!-- Base premium squircle: Outer rounded shape -->
    <rect x="8" y="8" width="144" height="144" rx="42" fill="url(#mainCoralGrad)" />
    
    <!-- Left overlay sweep: Elegant ribbon structure mimicking the icon details -->
    <path d="M 8 72 
             C 8 36, 36 8, 72 8 
             L 72 8
             C 45 40, 45 100, 72 152
             L 72 152
             C 36 152, 8 124, 8 88 Z" 
          fill="url(#overlaySweepGrad)" 
          opacity="0.95" />

    <!-- Bottom curve overlap: High contrast dark burgundy region -->
    <path d="M 72 152
             C 108 152, 152 116, 152 80
             C 134 100, 100 115, 72 152" 
          fill="url(#backSweepGrad)" />

    <!-- Central Play Button: Perfectly shaped right-facing triangle with rounded corners -->
    <path d="M 64 50
             C 64 45.5, 69 42.5, 73 45
             L 112 71
             C 116.5 73.5, 116.5 80.5, 112 83
             L 73 109
             C 69 111.5, 64 108.5, 64 104
             Z" 
          fill="#FFFFFF" />
  </g>
</svg>
